<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生如夏花</title>
    <style>
        :root {
            /* 极简主义配色：克制的灰阶 + 一抹墨色 */
            --color-bg: #fafaf9;
            --color-surface: #ffffff;
            --color-text: #1a1a1a;
            --color-text-muted: #737373;
            --color-text-subtle: #a3a3a3;
            --color-border: #e5e5e5;
            --color-border-strong: #1a1a1a;
            --color-accent: #1a1a1a;
            --color-error: #991b1b;

            --space-xs: 8px;
            --space-sm: 12px;
            --space-md: 24px;
            --space-lg: 48px;
            --space-xl: 80px;

            --font-serif: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
            --font-mono: "SF Mono", "JetBrains Mono", "Menlo", monospace;
        }

        * {
            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-sans);
            font-size: 15px;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: var(--space-xl) var(--space-md);
        }

        /* 顶部标识：极小、低调 */
        .brand {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--color-text-subtle);
            text-transform: uppercase;
            margin-bottom: var(--space-xl);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .brand::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--color-border);
        }

        /* 引文：衬线字体，留白充足 */
        blockquote {
            margin: 0 0 var(--space-xl) 0;
            padding: 0;
            font-family: var(--font-serif);
            font-size: 18px;
            line-height: 1.9;
            color: var(--color-text);
            font-weight: 400;
            position: relative;
        }

        blockquote p {
            margin: 0 0 var(--space-md) 0;
        }

        blockquote cite {
            display: block;
            font-family: var(--font-sans);
            font-size: 12px;
            font-style: normal;
            color: var(--color-text-muted);
            letter-spacing: 0.05em;
            margin-top: var(--space-md);
        }

        blockquote cite::before {
            content: "— ";
        }

        /* 分隔线 */
        .divider {
            border: 0;
            height: 1px;
            background: var(--color-border);
            margin: var(--space-lg) 0;
        }

        /* 登录区：克制的表单 */
        .login-form {
            background: transparent;
        }

        .login-form .section-label {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--color-text-muted);
            margin-bottom: var(--space-md);
        }

        .field {
            margin-bottom: var(--space-md);
        }

        .login-form label {
            display: block;
            font-size: 12px;
            color: var(--color-text-muted);
            margin-bottom: var(--space-xs);
            letter-spacing: 0.02em;
        }

        .login-form input {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-bottom: 1px solid var(--color-border);
            background: transparent;
            color: var(--color-text);
            font-family: var(--font-sans);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .login-form input:focus {
            border-bottom-color: var(--color-border-strong);
        }

        .login-form input::placeholder {
            color: var(--color-text-subtle);
        }

        .login-form button {
            width: 100%;
            padding: 14px;
            margin-top: var(--space-sm);
            background: var(--color-accent);
            color: var(--color-surface);
            border: 1px solid var(--color-accent);
            font-family: var(--font-sans);
            font-size: 13px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .login-form button:hover {
            background: transparent;
            color: var(--color-accent);
        }

        #login-error {
            margin-top: var(--space-md);
            padding: var(--space-sm) 0;
            font-size: 13px;
            color: var(--color-error);
            border-top: 1px solid var(--color-error);
            text-align: left;
        }

        /* 文件列表：清晰的层级 */
        #file-links {
            margin-top: var(--space-lg);
        }

        #file-links .section-label {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--color-text-muted);
            margin-bottom: var(--space-md);
            padding-bottom: var(--space-sm);
            border-bottom: 1px solid var(--color-border);
        }

        #file-links ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #file-links li {
            margin: 0;
        }

        #file-links li a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--color-text);
            text-decoration: none;
            padding: var(--space-md) 0;
            border-bottom: 1px solid var(--color-border);
            font-size: 15px;
            transition: padding-left 0.25s ease, color 0.2s ease;
        }

        #file-links li a::after {
            content: "→";
            font-family: var(--font-mono);
            color: var(--color-text-subtle);
            transition: transform 0.25s ease, color 0.2s ease;
        }

        #file-links li a:hover {
            padding-left: var(--space-sm);
            color: var(--color-accent);
        }

        #file-links li a:hover::after {
            transform: translateX(4px);
            color: var(--color-accent);
        }

        /* 页脚 */
        .footer {
            margin-top: var(--space-xl);
            padding-top: var(--space-md);
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--color-text-subtle);
            letter-spacing: 0.05em;
            text-align: center;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container {
                padding: var(--space-lg) var(--space-md);
            }

            blockquote {
                font-size: 16px;
            }
        }

        /* 微妙的载入动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container>* {
            animation: fadeIn 0.6s ease-out backwards;
        }

        .brand {
            animation-delay: 0s;
        }

        blockquote {
            animation-delay: 0.1s;
        }

        .divider {
            animation-delay: 0.2s;
        }

        #login-section,
        #file-links {
            animation-delay: 0.3s;
        }
    </style>
</head>

<body>
    <main class="container">
        <div class="brand">生如夏花</div>

        <blockquote>
            <p>人最宝贵的是生命。生命对于每个人只有一次。</p>
            <p>人的一生应当这样度过：当他回首往事时，不因虚度年华而悔恨，也不因碌碌无为而羞耻。</p>
            <cite>奥斯特洛夫斯基</cite>
        </blockquote>

        <hr class="divider" />

        <div id="file-links">
            <div class="section-label">Projects</div>
            <ul><!-- 动态注入 --></ul>
        </div>

        <div class="footer">© zskksz</div>
    </main>

    <script>
        function displayFileLinks() {
            const fileListContainer = document.querySelector('#file-links ul');
            fileListContainer.innerHTML = '';
            const githubUsername = 'zskksz';
            const repositoryName = 'https://www.280468.xyz';
            const files = [
                { name: 'News-Agent', path: 'News-Agent' },
                { name: 'HTML PPT', path: 'paper' },
                { name: 'ScholarFlow', path: 'ScholarFlow' },
                { name: '深大体育场馆秒约', path: 'SZU_Sports' },
            ];
            files.forEach(file => {
                const listItem = document.createElement('li');
                const link = document.createElement('a');
                link.href = `${repositoryName}/${file.path}`;
                link.textContent = file.name;
                link.target = '_blank';
                listItem.appendChild(link);
                fileListContainer.appendChild(listItem);
            });
        }

        displayFileLinks();
    </script>
</body>

</html>
